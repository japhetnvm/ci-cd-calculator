<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator | Calc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <!-- wert -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F5F3EE;
      --surface:       #EEEBE3;
      --card:          #FFFFFF;
      --border:        #D9D6CF;
      --ink:           #111010;
      --ink-2:         #6B6762;
      --accent:        #1D3557;
      --accent-lt:     #457B9D;
      --accent-glow:   rgba(29, 53, 87, 0.15);
      --op-bg:         #EBF0F6;
      --op-text:       #1D3557;
      --danger:        #C0392B;
      --danger-bg:     #FDECEA;
      --success:       #196F3D;
      --unit-bg:       #EAF4ED;
      --unit-text:     #196F3D;
      --unit-border:   #A9DFBF;
      --mono:          'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,243,238,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-brand .mark {
      width: 22px; height: 22px;
      border-radius: 4px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }

    .nav-back {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-2);
      text-decoration: none;
      padding: 0.38rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      transition: border-color 0.18s, color 0.18s;
    }

    .nav-back:hover { border-color: var(--accent); color: var(--ink); }

    /* ── THEME TOGGLE ── */
    .theme-toggle-btn {
      position: fixed; top: 68px; right: 1.25rem; z-index: 200;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.95rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: border-color 0.18s;
    }

    .theme-toggle-btn:hover { border-color: var(--accent); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 5rem;
    }

    .calc-wrapper { width: 100%; max-width: 400px; }

    /* ── HEADER CARD ── */
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-card h4 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .header-card .author-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-2);
      letter-spacing: 0.06em;
    }

    /* ── CALCULATOR CARD ── */
    .calculator-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 4px 4px 0 var(--accent);
      overflow: hidden;
    }

    /* ── DISPLAY ── */
    .display-area {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem 0.9rem;
    }

    .display-expr {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-2);
      min-height: 1.2em;
      text-align: right;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .display-input {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
      text-align: right;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      letter-spacing: -0.02em;
      padding: 0;
      caret-color: var(--accent);
    }

    .display-input::placeholder { color: var(--border); }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0.9rem;
    }

    .calc-btn {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      height: 56px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, filter 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .calc-btn:active { transform: scale(0.93); }

    .calc-btn.num {
      background: var(--bg);
      color: var(--ink);
      border-color: var(--border);
    }
    .calc-btn.num:hover { filter: brightness(0.96); }

    .calc-btn.op {
      background: var(--op-bg);
      color: var(--op-text);
      border-color: #C5D5E8;
      font-size: 1.15rem;
    }
    .calc-btn.op:hover { filter: brightness(0.95); }

    .calc-btn.action {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: #F1ACA6;
    }
    .calc-btn.action:hover { filter: brightness(0.95); }

    .calc-btn.equals {
      grid-column: span 4;
      background: var(--accent);
      color: #fff;
      font-size: 1.1rem;
      height: 50px;
      border-color: var(--accent);
      box-shadow: 0 3px 12px var(--accent-glow);
      letter-spacing: 0.04em;
    }
    .calc-btn.equals:hover { background: var(--accent-lt); }

    .calc-btn.unit {
      background: var(--unit-bg);
      color: var(--unit-text);
      border-color: var(--unit-border);
      font-size: 0.82rem;
    }
    .calc-btn.unit:hover { filter: brightness(0.96); }

    /* ── SCROLL UP ── */
    #scroll-to-calculator {
      position: fixed; bottom: 1.5rem; right: 1.25rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-2);
      transition: border-color 0.18s, color 0.18s;
    }
    #scroll-to-calculator:hover { border-color: var(--accent); color: var(--accent); }

    /* ── UNIT MODAL ── */
    .modal-content {
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(29,53,87,0.14);
      font-family: 'Inter', sans-serif;
      background: var(--card);
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.4rem;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .modal-body { padding: 1.4rem; }

    .form-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 0.3rem;
      display: block;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .form-select, .form-control {
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--bg);
      box-shadow: none !important;
      width: 100%;
      padding: 0.5rem 0.75rem;
    }

    .form-select:focus, .form-control:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
    }

    /* value input with unit label */
    .input-with-unit {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      background: var(--bg);
      transition: border-color 0.18s;
    }
    .input-with-unit:focus-within { border-color: var(--accent); }

    .input-with-unit input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.5rem 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
    }

    .unit-label-tag {
      padding: 0 0.75rem;
      background: var(--surface);
      border-left: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink-2);
      display: flex;
      align-items: center;
    }

    .btn-unit-calc {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.18s;
      letter-spacing: 0.04em;
    }

    .btn-unit-calc:hover { background: var(--accent-lt); }

    .unit-result {
      margin-top: 1rem;
      padding: 1rem 1.1rem;
      border-radius: 9px;
      background: var(--unit-bg);
      border: 1px solid var(--unit-border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .unit-result.d-none { display: none; }

    .unit-from {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--ink-2);
    }

    .unit-arrow {
      font-size: 1rem;
      color: var(--unit-text);
      font-weight: bold;
    }

    .unit-to {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--unit-text);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.1rem 2rem;
      display: flex; align-items: center; justify-content: center;
    }

    footer span {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-2);
      letter-spacing: 0.03em;
    }

    /* ── DARK MODE ── */
    body.dark {
      --bg:          #0D1117;
      --surface:     #161B22;
      --card:        #1C2333;
      --border:      #2D3748;
      --ink:         #E6EDF3;
      --ink-2:       #8B949E;
      --op-bg:       #1A2744;
      --op-text:     #79B8FF;
      --accent-glow: rgba(69, 123, 157, 0.3);
      --unit-bg:     #0D2318;
      --unit-text:   #3FB950;
      --unit-border: #1A4429;
      --danger-bg:   #2A1A1A;
      --danger:      #F85149;
    }

    body.dark nav { background: rgba(13,17,23,0.92); }
    body.dark .form-select,
    body.dark .form-control,
    body.dark .input-with-unit input { color: var(--ink); background: var(--surface); }
    body.dark .input-with-unit { background: var(--surface); }
    body.dark .unit-label-tag { background: var(--bg); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="nav-brand">
      <span class="mark">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="1" width="4" height="4" fill="white"/>
          <rect x="7" y="1" width="4" height="4" fill="white"/>
          <rect x="1" y="7" width="4" height="4" fill="white"/>
          <rect x="7" y="7" width="4" height="4" fill="white" opacity="0.4"/>
        </svg>
      </span>
      VUNA Calc
    </a>
    <a href="index.html" class="nav-back">← Home</a>
  </nav>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>

  <!-- MAIN -->
  <main>
    <div class="calc-wrapper">

      <!-- Header -->
      <div class="header-card">
        <h4>VUNA Calculator</h4>
        <span class="author-tag">by Japhet · SEN 400</span>
      </div>

      <!-- Calculator -->
      <div class="calculator-card">

        <!-- Display -->
        <div class="display-area">
          <div class="display-expr" id="expr"></div>
          <input type="text" class="display-input" id="result" placeholder="0" disabled />
        </div>

        <!-- Buttons -->
        <div class="btn-grid">

          <!-- Row 1 -->
          <button class="calc-btn num" onclick="bracketToResult('(')">(</button>
          <button class="calc-btn num" onclick="bracketToResult(')')">)</button>
          <button class="calc-btn num" onclick="backspace()">⌫</button>
          <button class="calc-btn action" onclick="clearResult()">AC</button>

          <!-- Row 2 -->
          <button class="calc-btn num" onclick="appendToResult(7)">7</button>
          <button class="calc-btn num" onclick="appendToResult(8)">8</button>
          <button class="calc-btn num" onclick="appendToResult(9)">9</button>
          <button class="calc-btn op"  onclick="operatorToResult(' ÷ ')"> ÷ </button> 
           <!-- ÷  -->


          <!-- Row 3 -->
          <button class="calc-btn num" onclick="appendToResult(4)">4</button>
          <button class="calc-btn num" onclick="appendToResult(5)">5</button>
          <button class="calc-btn num" onclick="appendToResult(6)">6</button>
          <button class="calc-btn op"  onclick="operatorToResult('*')">×</button>

          <!-- Row 4 -->
          <button class="calc-btn num" onclick="appendToResult(1)">1</button>
          <button class="calc-btn num" onclick="appendToResult(2)">2</button>
          <button class="calc-btn num" onclick="appendToResult(3)">3</button>
          <button class="calc-btn op"  onclick="operatorToResult('-')">−</button>

          <!-- Row 5 -->
          <button class="calc-btn num" onclick="appendToResult('.')">.</button>
          <button class="calc-btn num" onclick="appendToResult(0)">0</button>
          <button class="calc-btn unit" onclick="openUnitModal()">⚖️ Unit</button>
          <button class="calc-btn op"  onclick="operatorToResult('+')">+</button>

          <!-- Equals -->
          <button class="calc-btn equals" onclick="calculateResult()">=</button>

        </div>
      </div>

    </div>
  </main>

  <!-- SCROLL UP -->
  <button id="scroll-to-calculator" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

  <!-- ── UNIT CONVERTER MODAL ── -->
  <div class="modal fade" id="unitModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">⚖️ Unit Converter</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <label class="form-label">Category</label>
          <select id="unitCategory" class="form-select">
            <option value="length">📏 Length</option>
            <option value="temperature">🌡️ Temperature</option>
            <option value="weight">⚖️ Weight</option>
            <option value="speed">🚀 Speed</option>
            <option value="data">💾 Data</option>
          </select>

          <div class="mt-3">
            <label class="form-label">Conversion</label>
            <select id="conversionType" class="form-select"></select>
          </div>

          <div class="mt-3">
            <label class="form-label">Value</label>
            <div class="input-with-unit">
              <input type="number" id="unitValue" placeholder="Enter value" />
              <span class="unit-label-tag" id="fromLabel">—</span>
            </div>
          </div>

          <p style="font-size:0.78rem; color:var(--ink-2); margin-top:0.5rem; font-family:var(--mono);">
            → result in <strong id="toLabel">—</strong>
          </p>

          <button class="btn-unit-calc" onclick="computeUnit()">Convert</button>

          <div class="unit-result d-none" id="unitResult"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 japhet Calculator · Built for CI/CD Assignment · Japhet</span>
  </footer>

  <script src="assets/js/bootstrap.min.js"></script>
  <script src="assets/js/math.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
